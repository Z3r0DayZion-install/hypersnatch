name: Vanguard Institutional Release

on:
  push:
    tags:
      - 'v1.*'

jobs:
  build-and-release:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.17.0'
          cache: 'npm'

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Dependencies
        run: npm ci

      - name: Run Forensic Core Tests
        run: npm run test:ci

      - name: Deterministic Build & Package
        env:
          # Injected via GitHub Secrets for EV Code Signing
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:repro

      - name: Generate Release Hashes
        id: hash
        run: |
          $installerHash = (Get-FileHash -Algorithm SHA256 "dist\HyperSnatch-Setup-*.exe").Hash
          $exeHash = (Get-FileHash -Algorithm SHA256 "dist\win-unpacked\HyperSnatch.exe").Hash
          
          $hashDoc = "HYPERSNATCH_VANGUARD_HASHES.txt"
          "HyperSnatch-Setup (Installer): $installerHash" | Out-File $hashDoc
          "HyperSnatch (Unpacked EXE): $exeHash" | Out-File -Append $hashDoc
          
          echo "INSTALLER_HASH=$installerHash" >> $env:GITHUB_OUTPUT

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/HyperSnatch-Setup-*.exe
            HYPERSNATCH_VANGUARD_HASHES.txt
          body: |
            ## HyperSnatch Vanguard Institutional Release
            
            This is a deterministic, Sovereign-Tier release. 
            
            ### Integrity Proof (SHA-256)
            * **Installer:** `${{ steps.hash.outputs.INSTALLER_HASH }}`
            
            Please verify the downloaded artifact against this hash before execution.
          draft: false
          prerelease: false

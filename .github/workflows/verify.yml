name: HyperSnatch Verify

on:
  workflow_dispatch:
  push:
    paths:
      - "src/**"
      - "modules/**"
      - "scripts/**"
      - "rust/**"
      - "package.json"
      - "package-lock.json"
      - "VERSION.json"
      - ".github/workflows/**"
  pull_request:

jobs:
  verify:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Release gate (unsigned)
        env:
          HYPERSNATCH_SIGN: "0"
          HS_CORE_REQUIRED: "1"
        run: node scripts/verify_release.cjs

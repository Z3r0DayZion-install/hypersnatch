<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HyperSnatch - Emload Link Test</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #0b1116;
            color: #dde7ef;
        }
        .test-container {
            background: #121c24;
            border: 1px solid #203140;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .test-input {
            width: 100%;
            height: 100px;
            background: #1a2332;
            border: 1px solid #334155;
            border-radius: 4px;
            color: #dde7ef;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            margin-bottom: 15px;
        }
        .test-button {
            background: #13d0a6;
            color: #03110d;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-right: 10px;
        }
        .test-button:hover {
            background: #7be9d0;
        }
        .results {
            background: #1a2332;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
        }
        .candidate {
            background: #203140;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 10px;
        }
        .candidate.high {
            border-color: #13d0a6;
        }
        .candidate.medium {
            border-color: #ffbf47;
        }
        .candidate.low {
            border-color: #ff6b6b;
        }
        .confidence {
            float: right;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
        .high { background: #13d0a6; color: #03110d; }
        .medium { background: #ffbf47; color: #03110d; }
        .low { background: #ff6b6b; color: #03110d; }
        .method {
            font-size: 11px;
            color: #8ea0b1;
            margin-top: 5px;
        }
        .file-info {
            margin-top: 8px;
            font-size: 12px;
            color: #8ea0b1;
        }
        .summary {
            background: #0f161d;
            border: 1px solid #13d0a6;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
        }
        .status {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .success { color: #4ade80; }
        .error { color: #ff6b6b; }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .stat {
            background: #203140;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>🔗 HyperSnatch - Emload Link Test</h1>
    
    <div class="test-container">
        <h2>Test Input</h2>
        <textarea id="testInput" class="test-input" placeholder="Paste HTML content or URL here...">https://www.emload.com/v2/file/ajRGMlgyUmt0VXNnc01xNzRiZk5Odz09/syrup-series-complete-compilation-rar</textarea>
        <div>
            <button class="test-button" onclick="testHTMLParsing()">Test HTML Parsing</button>
            <button class="test-button" onclick="testURLParsing()">Test URL Direct</button>
            <button class="test-button" onclick="clearResults()">Clear Results</button>
        </div>
    </div>

    <div id="results" class="results" style="display: none;">
        <h2>📊 Results</h2>
        <div id="candidates"></div>
        <div id="summary"></div>
    </div>

    <script>
        // Emload URL processing logic (simplified from main file)
        const EmloadProcessor = {
            processEmloadUrl(url, index) {
                const candidates = [];
                
                // V2 pattern: /v2/file/{file_id}/{filename}
                const v2Pattern = /\/v2\/file\/([a-zA-Z0-9_-]+)\/([^\/\?]+)/;
                const v2Match = url.match(v2Pattern);
                
                if (v2Match) {
                    const fileId = v2Match[1];
                    const filename = v2Match[2];
                    
                    // Primary candidate with high confidence
                    candidates.push({
                        id: `emload-v2-${fileId}`,
                        url: url,
                        source: 'html',
                        type: this.detectFileType(filename),
                        rank: index + 1,
                        extractedAt: new Date().toISOString(),
                        confidence: 0.95,
                        method: 'v2-pattern-extraction',
                        host: 'www.emload.com',
                        filename: filename,
                        fileId: fileId,
                        category: 'direct-download'
                    });
                    
                    // Alternative candidates
                    candidates.push({
                        id: `emload-alt-${fileId}`,
                        url: `https://emload.com/file/${fileId}/${filename}`,
                        source: 'html',
                        type: this.detectFileType(filename),
                        rank: index + 1,
                        extractedAt: new Date().toISOString(),
                        confidence: 0.85,
                        method: 'alternative-url-format',
                        host: 'emload.com',
                        filename: filename,
                        fileId: fileId,
                        category: 'direct-download'
                    });
                    
                    candidates.push({
                        id: `emload-api-${fileId}`,
                        url: `https://api.emload.com/v2/file/${fileId}`,
                        source: 'html',
                        type: 'application/json',
                        rank: index + 1,
                        extractedAt: new Date().toISOString(),
                        confidence: 0.75,
                        method: 'api-endpoint',
                        host: 'api.emload.com',
                        fileId: fileId,
                        category: 'api-access'
                    });
                }
                
                return candidates;
            },
            
            detectFileType(url) {
                const ext = url.split('.').pop()?.toLowerCase().split('?')[0];
                const typeMap = {
                    'mp4': 'video/mp4',
                    'm3u8': 'application/x-mpegURL',
                    'mp3': 'audio/mpeg',
                    'jpg': 'image/jpeg',
                    'png': 'image/png',
                    'gif': 'image/gif',
                    'rar': 'archive/rar',
                    'zip': 'archive/zip',
                    '7z': 'archive/7z'
                };
                return typeMap[ext] || 'application/octet-stream';
            }
        };

        function testHTMLParsing() {
            const input = document.getElementById('testInput').value;
            const resultsDiv = document.getElementById('results');
            const candidatesDiv = document.getElementById('candidates');
            const summaryDiv = document.getElementById('summary');
            
            // Simulate HTML content with the URL
            const htmlContent = `<a href="${input}">Download Link</a>`;
            
            // Extract URLs from HTML
            const urlRegex = /https?:\/\/[^\s<>"']+/gi;
            const matches = htmlContent.match(urlRegex) || [];
            
            let allCandidates = [];
            
            matches.forEach((url, index) => {
                if (url.includes('emload.com')) {
                    const emloadCandidates = EmloadProcessor.processEmloadUrl(url, index);
                    allCandidates.push(...emloadCandidates);
                } else {
                    allCandidates.push({
                        id: `generic-${index}`,
                        url: url,
                        source: 'html',
                        type: 'application/octet-stream',
                        rank: index + 1,
                        extractedAt: new Date().toISOString(),
                        confidence: 0.50,
                        method: 'generic-extraction',
                        host: 'unknown',
                        category: 'unknown'
                    });
                }
            });
            
            // Sort by confidence
            allCandidates.sort((a, b) => b.confidence - a.confidence);
            
            // Display results
            displayResults(allCandidates);
        }

        function testURLParsing() {
            const input = document.getElementById('testInput').value;
            const resultsDiv = document.getElementById('results');
            const candidatesDiv = document.getElementById('candidates');
            const summaryDiv = document.getElementById('summary');
            
            // Process URL directly
            const candidates = EmloadProcessor.processEmloadUrl(input, 0);
            
            // Display results
            displayResults(candidates);
        }

        function displayResults(candidates) {
            const resultsDiv = document.getElementById('results');
            const candidatesDiv = document.getElementById('candidates');
            const summaryDiv = document.getElementById('summary');
            
            resultsDiv.style.display = 'block';
            
            // Display candidates
            let html = '<h3>🎯 Extracted Candidates</h3>';
            
            if (candidates.length === 0) {
                html += '<div class="candidate"><p>❌ No candidates found</p></div>';
            } else {
                candidates.forEach(candidate => {
                    const confidenceClass = candidate.confidence >= 0.8 ? 'high' : 
                                          candidate.confidence >= 0.6 ? 'medium' : 'low';
                    const confidenceLabel = candidate.confidence >= 0.8 ? 'HIGH' : 
                                             candidate.confidence >= 0.6 ? 'MEDIUM' : 'LOW';
                    
                    html += `
                        <div class="candidate ${confidenceClass}">
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <div>
                                    <strong>ID:</strong> ${candidate.id}<br>
                                    <strong>URL:</strong> ${candidate.url}<br>
                                    <strong>Method:</strong> ${candidate.method}<br>
                                    <strong>Category:</strong> ${candidate.category}
                                </div>
                                <div class="confidence ${confidenceClass}">${confidenceLabel}</div>
                            </div>
                            <div class="file-info">
                                <strong>Filename:</strong> ${candidate.filename || 'N/A'}<br>
                                <strong>Host:</strong> ${candidate.host}<br>
                                <strong>File ID:</strong> ${candidate.fileId || 'N/A'}<br>
                                <strong>Type:</strong> ${candidate.type}
                            </div>
                        </div>
                    `;
                });
            }
            
            candidatesDiv.innerHTML = html;
            
            // Display summary
            const totalCandidates = candidates.length;
            const highConfidence = candidates.filter(c => c.confidence >= 0.8).length;
            const mediumConfidence = candidates.filter(c => c.confidence >= 0.6 && c.confidence < 0.8).length;
            const avgConfidence = totalCandidates > 0 ? 
                (candidates.reduce((sum, c) => sum + c.confidence, 0) / totalCandidates).toFixed(2) : 0;
            
            const bestCandidate = candidates.length > 0 ? candidates[0] : null;
            const status = bestCandidate && bestCandidate.confidence >= 0.8 ? 'SUCCESS' : 'NEEDS_REVIEW';
            const statusClass = bestCandidate && bestCandidate.confidence >= 0.8 ? 'success' : 'error';
            
            summaryHtml = `
                <div class="summary">
                    <h3>📊 Summary</h3>
                    <div class="status ${statusClass}">Status: ${status}</div>
                    <div class="stats">
                        <div class="stat">
                            <strong>Total Candidates</strong><br>
                            <span style="font-size: 24px; color: #13d0a6;">${totalCandidates}</span>
                        </div>
                        <div class="stat">
                            <strong>High Confidence</strong><br>
                            <span style="font-size: 24px; color: #4ade80;">${highConfidence}</span>
                        </div>
                        <div class="stat">
                            <strong>Medium Confidence</strong><br>
                            <span style="font-size: 24px; color: #ffbf47;">${mediumConfidence}</span>
                        </div>
                        <div class="stat">
                            <strong>Average Confidence</strong><br>
                            <span style="font-size: 24px; color: #7be9d0;">${avgConfidence}</span>
                        </div>
                    </div>
                    ${bestCandidate ? `
                        <div style="margin-top: 15px; padding: 15px; background: #203140; border-radius: 6px;">
                            <strong>🏆 Best Candidate:</strong><br>
                            ID: ${bestCandidate.id}<br>
                            URL: ${bestCandidate.url}<br>
                            Confidence: ${(bestCandidate.confidence * 100).toFixed(1)}%<br>
                            Method: ${bestCandidate.method}
                        </div>
                    ` : ''}
                </div>
            `;
            
            summaryDiv.innerHTML = summaryHtml;
        }

        function clearResults() {
            document.getElementById('results').style.display = 'none';
            document.getElementById('candidates').innerHTML = '';
            document.getElementById('summary').innerHTML = '';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NEURAL LINK // RECEIVER</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root { --accent: #00d084; --bg: #050a0f; --text: #cfd8dc; }
    body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    header { padding: 15px; border-bottom: 1px solid var(--accent); text-align: center; font-weight: bold; font-size: 14px; letter-spacing: 2px; }
    #reader { width: 100%; flex: 1; background: #000; }
    .status-bar { padding: 10px; background: rgba(0, 208, 132, 0.1); font-size: 12px; display: flex; justify-content: space-between; }
    #progress-bar { height: 4px; background: var(--accent); width: 0%; transition: width 0.3s; }
    .log { height: 150px; overflow-y: auto; padding: 10px; font-size: 10px; border-top: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); }
  </style>
</head>
<body>
  <header>NEURAL LINK // RECEIVER</header>
  <div id="reader"></div>
  <div id="progress-bar"></div>
  <div class="status-bar">
    <span id="chunks-stat">CHUNKS: 0/0</span>
    <span id="status-text">AWAITING STREAM...</span>
  </div>
  <div class="log" id="log"></div>

  <script>
    let chunks = [];
    let totalChunks = 0;
    const logEl = document.getElementById('log');

    function log(msg) {
      const entry = document.createElement('div');
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      logEl.prepend(entry);
    }

    const html5QrCode = new Html5Qrcode("reader");
    const qrConfig = { fps: 10, qrbox: { width: 250, height: 250 } };

    html5QrCode.start({ facingMode: "environment" }, qrConfig, (decodedText) => {
      try {
        // Format: index:total:data
        const [indexStr, totalStr, data] = decodedText.split(':');
        const index = parseInt(indexStr);
        const total = parseInt(totalStr);

        if (!totalChunks) {
          totalChunks = total;
          chunks = new Array(total).fill(null);
          log(`Stream detected. Expecting ${total} chunks.`);
        }

        if (chunks[index] === null) {
          chunks[index] = data;
          const count = chunks.filter(c => c !== null).length;
          document.getElementById('chunks-stat').textContent = `CHUNKS: ${count}/${totalChunks}`;
          document.getElementById('progress-bar').style.width = `${(count/totalChunks)*100}%`;
          
          if (count === totalChunks) {
            finalize();
          }
        }
      } catch (e) {
        // Ignore malformed frames
      }
    });

    function finalize() {
      log("All chunks received. Reassembling...");
      const fullData = chunks.join('');
      const blob = new Blob([fullData], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      
      const a = document.createElement('a');
      a.href = url;
      a.download = `SATCHED_CASE_${Date.now()}.json`;
      a.click();
      
      log("CASE REASSEMBLED AND DOWNLOADED.");
      document.getElementById('status-text').textContent = "REASSEMBLY COMPLETE";
      html5QrCode.stop();
    }
  </script>
</body>
</html>
